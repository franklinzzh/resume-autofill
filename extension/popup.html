<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>简历自动填充助手</title>
    <link rel="stylesheet" href="../css/popup.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📋 简历自动填充</h1>
            <p class="subtitle">智能识别表单并自动填充简历信息</p>
        </div>

        <div class="content">
            <!-- 上传/导入简历 -->
            <div class="section">
                <h2>1️⃣ 导入简历</h2>
                <div class="upload-area" id="uploadArea">
                    <input type="file" id="fileInput" accept=".json" style="display: none">
                    <div class="upload-text">
                        <p>📁 点击选择JSON文件或拖放</p>
                        <p class="small-text">支持从API获取或上传本地JSON</p>
                    </div>
                </div>
            </div>

            <!-- 简历预览 -->
            <div class="section" id="previewSection" style="display: none;">
                <h2>2️⃣ 简历预览</h2>
                <div class="preview-box" id="previewBox">
                    <div id="previewContent"></div>
                </div>
            </div>

            <!-- 扫描表单 -->
            <div class="section">
                <h2>3️⃣ 检测表单</h2>
                <button id="scanBtn" class="btn btn-primary">🔍 扫描当前页面</button>
                <div id="formsPanel" style="display: none;">
                    <div id="formsList"></div>
                </div>
            </div>

            <!-- 自动填充 -->
            <div class="section">
                <h2>4️⃣ 自动填充</h2>
                <button id="fillBtn" class="btn btn-success" disabled>✨ 自动填充所有字段</button>
                <div id="statusMessage" class="status-message"></div>
            </div>

            <!-- API设置 -->
            <div class="section">
                <h2>⚙️ 高级设置</h2>
                <details>
                    <summary>📡 API方式导入</summary>
                    <div class="api-section">
                        <label>API地址:</label>
                        <input type="text" id="apiUrl" placeholder="http://localhost:8000/api/resume">
                        <button id="fetchBtn" class="btn btn-small">从API加载</button>
                    </div>
                </details>
            </div>
        </div>

        <div class="footer">
            <p>v1.0.0 • 开源项目</p>
        </div>
    </div>

    <script src="../js/popup.js"></script>
</body>
</html>
